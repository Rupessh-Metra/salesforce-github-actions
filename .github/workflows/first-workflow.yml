name: Salesforce CI

on:
  push:
    branches:
      - main

jobs:
  salesforce:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Step 3: Install Salesforce CLI
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      # Step 4: Verify Salesforce CLI installation
      - name: Verify Salesforce CLI
        run: sf --version

      # Step 5: Create a temporary file containing the SFDX Auth URL
      - name: Create Auth File
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > sfdx_auth.txt

      # Step 6: Authenticate to Salesforce
      - name: Authenticate to Salesforce
        run: |
          sf org login sfdx-url \
            --sfdx-url-file sfdx_auth.txt \
            --alias dev-org \
            --set-default

      # Step 7: Verify authentication
      - name: Verify Connected Org
        run: sf org list