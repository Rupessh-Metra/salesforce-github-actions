name: Salesforce CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  salesforce:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install Salesforce CLI
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      # Verify CLI installation
      - name: Verify Salesforce CLI
        run: sf --version

      # Create authentication file
      - name: Create Auth File
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > sfdx_auth.txt

      # Authenticate to Salesforce
      - name: Authenticate to Salesforce
        run: |
          sf org login sfdx-url \
            --sfdx-url-file sfdx_auth.txt \
            --alias dev-org \
            --set-default

      # Remove temporary auth file
      - name: Delete Auth File
        run: rm sfdx_auth.txt

      # Verify authenticated org
      - name: Verify Connected Org
        run: sf org list

      # Validate deployment
      - name: Validate Deployment
        run: |
          sf project deploy validate \
            --target-org dev-org